# Corre las pruebas del sitio en cada push. Si algo falla, GitHub
# muestra una ✗ roja en el commit (el sitio se publica igual: esto
# avisa, no bloquea).
name: Pruebas
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  pruebas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node .github/probar.js
